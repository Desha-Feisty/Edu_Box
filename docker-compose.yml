# ============================================
# EduBox Docker Compose
# ============================================
# Usage:
#   docker compose up --build         # Build & start
#   docker compose up -d              # Start detached
#   docker compose down               # Stop & remove
#   docker compose logs -f            # Follow logs
# ============================================

services:
  # ============================================
  # Backend API — Express + Socket.io
  # ============================================
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: edubox-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/edubox}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_LIFETIME=${JWT_LIFETIME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_LIFETIME=${JWT_REFRESH_LIFETIME}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://frontend}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # MongoDB — Database for the application
  # ============================================
  mongodb:
    image: mongo:7
    container_name: edubox-mongodb
    command: ["mongod", "--quiet"]
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "mongod"]
      interval: 30s
      retries: 3
      start_period: 20s

  # ============================================
  # Frontend — Nginx serving React SPA
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: edubox-frontend
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
